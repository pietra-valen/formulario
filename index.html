<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Formulário</title>

    <link rel="stylesheet" href="style.css">



    <link
        href="https://cdn.jsdelivr.net/npm/froala-editor@latest/css/froala_editor.pkgd.min.css"
        rel="stylesheet"
        type="text/css" />

    <script
        src="https://cdn.jsdelivr.net/npm/froala-editor@latest/js/froala_editor.pkgd.min.js">
    </script>

</head>

<body>

    <form
        action=""
        method="POST"
        onsubmit="return processar_formulario()">

        <h1>Cadastre-se</h1>



        <div class="form-group">

            <label for="nome">
                Nome:
            </label>

            <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Nome completo..."
                required>

        </div>



        <div class="form-group">

            <label for="data_nascimento">
                Data de nascimento:
            </label>

            <input
                type="date"
                id="data_nascimento"
                name="data_nascimento"
                required>

        </div>

        

        <div class="form-group">

            <label for="email">
                Email:
            </label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Digite seu email"
                required>

        </div>

       

        <div class="form-group">

            <label for="telefone">
                Telefone:
            </label>

            <input
                type="tel"
                id="telefone"
                name="telefone">

        </div>

        

        <div class="form-group">

            <label for="senha">
                Senha:
            </label>

            <input
                type="password"
                id="senha"
                name="senha">

        </div>

        

        <div class="form-group">

            <label for="cor">
                Cor favorita:
            </label>

            <input
                type="color"
                id="cor"
                name="cor">

        </div>

        

        <div class="form-group">

            <label>
                Habilidades:
            </label>

            <label for="html">

                <input
                    type="checkbox"
                    id="html"
                    name="habilidades"
                    value="HTML">

                HTML

            </label>

            <label for="css">

                <input
                    type="checkbox"
                    id="css"
                    name="habilidades"
                    value="CSS">

                CSS

            </label>

            <label for="js">

                <input
                    type="checkbox"
                    id="js"
                    name="habilidades"
                    value="JavaScript">

                JavaScript

            </label>

        </div>

     

        <div class="form-group">

            <label for="pais">
                País:
            </label>

            <select
                id="pais"
                name="pais">

                <option value="br">
                    Brasil
                </option>

                <option value="ar">
                    Argentina
                </option>

                <option value="py">
                    Paraguai
                </option>

                <option value="us">
                    Estados Unidos
                </option>

                <option value="jp">
                    Japão
                </option>

            </select>

        </div>

        

        <div class="form-group">

            <label for="comentarios">
                Comentários:
            </label>

            <textarea
                id="comentarios"
                name="comentarios"
                rows="5"
                cols="50"></textarea>

        </div>

        <!-- BOTÃO -->

        <div class="form-group">

            <input
                type="submit"
                value="Enviar">

        </div>

       

        <p id="mensagem"></p>

    </form>

    <script>

        new FroalaEditor('textarea');

        let nome_elem =
            document.querySelector("#nome");

        let email_elem =
            document.querySelector("#email");

        let mensagem_elem =
            document.querySelector("#mensagem");

        function processar_formulario(){

            let nome =
                nome_elem.value;

            let email =
                email_elem.value;

            if(nome === ""){

                mensagem_elem.innerHTML =
                    "Informe o nome!";

                return false;
            }

            if(email === ""){

                mensagem_elem.innerHTML =
                    "Informe o email!";

                return false;
            }

            mensagem_elem.innerHTML =
                "Formulário enviado com sucesso!";

            return false;
        }

    </script>

</body>
</html>
